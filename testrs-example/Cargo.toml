[package]
name = "testrs-example"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
testrs = { path = "../testrs" }

[dev-dependencies]
kitest = "0.5"
tokio = { version = "1", features = ["rt-multi-thread"] }

# The testrs-generated harness; runs under `cargo test -p testrs-example`.
[[test]]
name = "harness"
path = "tests/harness.rs"
harness = false
